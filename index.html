<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background-color: maroon;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; 
            border-bottom: 4px solid white;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: bold;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: clamp(16px, 3vw, 20px);
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffb6c1; 
            text-decoration: underline;
        }

        /* LAPTOP STYLE: Same size as before */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            padding: 40px 10%;
            gap: 40px;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-text h3 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .hero-text h2 { 
            font-size: clamp(40px, 8vw, 75px);
            line-height: 1.1;
            border-bottom: 10px solid white;
            display: inline-block;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: 24px;
            font-weight: bold;
        }

        .hero-image {
            max-width: 800px; /* LAPTOP: Same size - 800px max */
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(15px 15px 30px rgba(0,0,0,0.6));
        }

        footer {
            padding: 20px;
            border-top: 4px solid white; 
            text-align: center;
            font-weight: bold;
            background: maroon; 
            color: white;
        }

        /* PHONE STYLE: BIG PICTURE - Takes FULL screen width! */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 20px 5px; 
                gap: 20px;
            }

            .hero-text {
                order: 1;
                width: 100%;
            }

            .hero-image {
                order: 2;
                max-width: 100%; 
                width: 100%;
                display: flex;
                justify-content: center;
                margin-top: 10px;
            }

            .hero-image img {
                width: 100% !important; /* BIG PICTURE: Full phone width */
                max-width: 100%; 
                height: auto;
                max-height: 70vh; /* Prevents it from being too tall */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">MY COLLEGE DIARY</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>, 𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.jpg" alt="Mary Jine"> <!-- ✅ FIXED: maryjine.jpg -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
