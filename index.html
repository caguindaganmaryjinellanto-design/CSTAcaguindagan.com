<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background-color: maroon;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white;
            z-index: 10;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #ffcccb; }

        /* --- HERO SECTION --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            padding: 0 5% 0 10%; /* More room on the left for text */
            gap: 20px;
            width: 100%;
        }

        .hero-text {
            flex: 1;
            max-width: 500px; /* Limits text width to give image more room */
        }

        .hero-text h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .hero-text h2 { 
            font-size: clamp(35px, 5.5vw, 65px);
            font-weight: bold;
            line-height: 1.2;
            border-bottom: 8px solid white; 
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .hero-text p {
            font-size: 24px;
            font-weight: bold;
            opacity: 0.9;
        }

        /* --- IMAGE CONTAINER --- */
        .hero-image {
            flex: 1.3; /* This makes the image container wider than the text */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Aligns photo to bottom of the section */
            height: 100%;
        }

        .hero-image img {
            height: 80vh; /* Makes the photo fill 80% of the screen height */
            width: auto;  /* Maintains aspect ratio */
            max-width: 100%; 
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));
            transition: transform 0.3s ease;
        }

        .hero-image img:hover {
            transform: scale(1.02); /* Subtle pop on hover */
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                padding: 15px;
            }

            nav { margin-top: 10px; }
            nav a { margin: 0 10px; font-size: 16px; }

            .hero {
                flex-direction: column; 
                text-align: center;
                padding: 40px 20px;
                justify-content: center;
            }

            .hero-text { order: 2; }

            .hero-image {
                order: 1;
                max-width: 100%;
                margin-bottom: 20px;
                align-items: center; /* Center image on mobile */
            }

            .hero-image img {
                height: 45vh; /* Shorter for phone screens */
            }
        }

        footer {
            padding: 15px;
            border-top: 4px solid white; 
            text-align: center;
            background: maroon; 
            color: white;
            font-weight: bold;
            font-size: 14px;
            position: relative;
            z-index: 5;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">HOME</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
