<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            /* Using a linear gradient overlay for readability */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background-color: maroon;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white;
            z-index: 10;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffcccb; /* Light pink hover effect */
        }

        /* --- HERO SECTION --- */
        .hero {
            flex: 1; /* Pushes footer to the bottom */
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            padding: 20px 10%;
            gap: 50px;
            width: 100%;
        }

        .hero-text {
            flex: 1;
            max-width: 600px;
        }

        .hero-text h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .hero-text h2 { 
            font-size: clamp(35px, 6vw, 70px); /* Better scaling */
            font-weight: bold;
            line-height: 1.2;
            border-bottom: 8px solid white; 
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .hero-text p {
            font-size: 24px;
            font-weight: bold;
            opacity: 0.9;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            max-width: 450px; /* Limits size on large laptops */
            width: 100%;
            height: auto;
            object-fit: contain;
            /* Filter makes your PNG pop against the dark background */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            nav {
                margin-top: 10px;
            }

            nav a {
                margin: 0 10px;
                font-size: 16px;
            }

            .hero {
                flex-direction: column; /* Stack image and text */
                text-align: center;
                padding: 50px 20px;
                justify-content: center;
            }

            .hero-text {
                order: 2; /* Text moves below image on mobile */
            }

            .hero-image {
                order: 1; /* Image moves to top on mobile */
                max-width: 80%;
                margin-bottom: 30px;
            }

            .hero-image img {
                max-width: 300px; /* Slightly smaller on phones */
            }
        }

        footer {
            padding: 15px;
            border-top: 4px solid white; 
            text-align: center;
            background: maroon; 
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">HOME</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <!-- Ensure maryjine.png is in the same folder -->
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
