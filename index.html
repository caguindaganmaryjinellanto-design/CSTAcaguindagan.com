<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        } /* FIXED: Added missing closing brace here */

        header {
            background-color: maroon;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white;
            flex-wrap: wrap; 
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        /* --- HERO SECTION: LAPTOP --- */
        .hero {
            flex: 1;
            display: flex;
            align-items: flex-end; 
            justify-content: space-between;
            padding: 0 5% 0 10%;
            position: relative;
        }

        .hero-text {
            padding-bottom: 15vh;
            max-width: 600px;
            z-index: 5;
        }

        .hero-text h2 { 
            font-size: 75px; 
            line-height: 1.1;
            border-bottom: 12px solid white; 
            display: inline-block;
            margin-bottom: 20px;
        }

        .hero-image {
            height: 95vh; /* Massive height for Laptop */
            display: flex;
            align-items: flex-end;
        }

        .hero-image img {
            height: 100%; /* Forces image to be tall on Laptop */
            width: auto;
            filter: drop-shadow(20px 0px 30px rgba(0,0,0,0.6)); 
            display: block;
        }

        /* --- HERO SECTION: PHONE --- */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 40px 10px 0 10px;
                justify-content: flex-start;
            }

            .hero-text {
                padding-bottom: 20px;
                order: 1;
            }

            .hero-text h2 {
                font-size: 50px;
            }

            .hero-image {
                order: 2;
                height: auto; /* FIXED: Removed 60vh limit for Phone */
                width: 100%;
                display: flex;
                justify-content: center;
            }

            .hero-image img {
                width: 95%; /* Image now fills the phone width */
                height: auto;
                max-width: 450px;
            }
        }

        footer {
            padding: 20px;
            border-top: 4px solid white; 
            text-align: center;
            background: maroon; 
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">HOME</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>,𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
