<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

         body {
            /* Using your background image logic */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* Prevents horizontal scrolling */

        header {
            /* Changed to Maroon */
      background-color: maroon;
 padding: 15px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap; /* Allows menu to wrap if it's too long */
}

nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

nav a {
    margin: 5px;
    font-size: clamp(14px, 4vw, 20px); /* Scales font based on screen width */
}

        nav a:hover {
            color: #ffb6c1; 
            text-decoration: underline;
        }

    /* Replace the .hero and .hero-image styles in index.html */
.hero {
    flex: 1;
    display: flex;
    flex-direction: row; /* Side by side on laptop */
    align-items: center;
    justify-content: center;
    padding: 20px 5%;
    gap: 20px;
}

.hero-text h2 { 
    font-size: clamp(32px, 8vw, 75px); /* Responsive font size */
    border-bottom: 8px solid white;
}

.hero-image {
    max-width: 500px;
    width: 100%;
}

.hero-image img {
    width: 100%;
    height: auto;
    object-fit: contain;
}

/* Mobile Fix */
@media (max-width: 768px) {
    .hero {
        flex-direction: column; /* Stack vertically on phone */
        text-align: center;
    }
    .hero-text {
        padding-bottom: 20px;
    }
}

        footer {
            padding: 20px;
            border-top: 4px solid white; 
            text-align: center;
            font-weight: bold;
            background: maroon; 
            color: white;
            position: relative;
            z-index: 10;
        }

        /* Responsive Fix for Mobile */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding-top: 40px;
            }
            .hero-text {
                padding-bottom: 20px;
            }
            .hero-text h2 {
                font-size: 50px;
            }
            .hero-image {
                height: 60vh;
            }
        }
    </style>
</head>
<body>

  <header>
        <h1>MY COLLEGE DIARY</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
          <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>,𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
