<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        } /* FIXED: Closing brace added here */

        header {
            background-color: maroon;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white;
            flex-wrap: wrap; /* Allows menu to wrap on small phones */
            gap: 15px;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: clamp(24px, 5vw, 32px); /* Scales font based on screen size */
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        /* --- DESKTOP/LAPTOP STYLE (Half Screen) --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: row;
            align-items: center; 
            justify-content: space-around;
            padding: 40px 10%;
        }

        .hero-text {
            max-width: 500px;
        }

        .hero-text h2 { 
            font-size: 60px; 
            line-height: 1.1;
            border-bottom: 10px solid white; 
            display: inline-block;
            margin-bottom: 20px;
        }

        .hero-image {
            height: 50vh; /* Exactly half of the laptop screen height */
            display: flex;
            align-items: center;
        }

        .hero-image img {
            height: 100%; 
            width: auto;
            filter: drop-shadow(15px 15px 25px rgba(0,0,0,0.6)); 
        }

        /* --- MOBILE STYLE (Full Screen Image) --- */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column; /* Stacks text on top of image */
                text-align: center;
                padding: 40px 0 0 0; /* Remove side padding for full-width image */
            }

            .hero-text {
                padding: 0 20px 20px 20px; /* Keep text away from edges */
            }

            .hero-text h2 {
                font-size: 45px;
            }

            .hero-image {
                width: 100%; /* Container fills the whole phone width */
                height: auto;
                margin-top: 20px;
            }

            .hero-image img {
                width: 100%; /* Photo touches both edges of the phone */
                height: auto;
                max-width: none;
                filter: none; /* Optional: remove shadow for a cleaner full-screen look */
            }
        }

        footer {
            padding: 20px;
            border-top: 4px solid white; 
            text-align: center;
            background: maroon; 
            color: white;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">HOME</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>,𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
