<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background-color: maroon;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white;
            z-index: 10;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #ffcccb; }

        /* --- HERO SECTION --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            padding: 0 5%;
            gap: 20px;
            width: 100%;
            height: calc(100vh - 70px); /* Forces section to fill screen height */
        }

        .hero-text {
            flex: 1;
            max-width: 550px;
            z-index: 2;
        }

        .hero-text h3 {
            font-size: clamp(20px, 3vw, 30px);
            margin-bottom: 5px;
        }

        .hero-text h2 { 
            font-size: clamp(40px, 6vw, 80px); /* Massive text for big screens */
            font-weight: bold;
            line-height: 1.1;
            border-bottom: 10px solid white; 
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .hero-text p {
            font-size: clamp(18px, 2vw, 26px);
            font-weight: bold;
        }

        /* --- IMAGE CONTAINER (BIGGER) --- */
        .hero-image {
            flex: 1.5; /* Gives image more room than text */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Sits photo on the footer */
            height: 100%;
        }

        .hero-image img {
            height: 95vh; /* HUGE on Laptop - 95% of screen height */
            width: auto;
            max-width: 100%; 
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
            transition: transform 0.3s ease;
        }

        /* --- MOBILE FIX (BIGGER) --- */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                padding: 15px;
            }

            nav { margin-top: 10px; }
            nav a { margin: 0 8px; font-size: 15px; }

            .hero {
                flex-direction: column; 
                text-align: center;
                padding: 20px;
                justify-content: flex-start; /* Start from top */
                height: auto;
            }

            .hero-text { 
                order: 2; 
                margin-top: -50px; /* Overlaps image slightly for a cool look */
                padding-bottom: 40px;
            }

            .hero-image {
                order: 1;
                width: 100%;
                height: auto;
                margin-bottom: 20px;
            }

            .hero-image img {
                height: 70vh; /* HUGE on Mobile - 70% of screen height */
                width: auto;
                max-height: 500px; /* Prevents it from being too tall on long phones */
            }
        }

        footer {
            padding: 15px;
            border-top: 4px solid white; 
            text-align: center;
            background: maroon; 
            color: white;
            font-weight: bold;
            position: relative;
            z-index: 5;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">HOME</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
