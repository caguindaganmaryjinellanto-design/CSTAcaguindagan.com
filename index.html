<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background-color: maroon;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; 
            border-bottom: 4px solid white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: bold;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: clamp(16px, 3vw, 20px);
            font-weight: bold;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 25px;
        }

        nav a:hover {
            color: #ffb6c1; 
            background: rgba(255, 255, 255, 0.1);
            text-decoration: none;
        }

        /* 🎨 ENHANCED HERO - BIG PICTURE EVERYWHERE */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            padding: 60px 5%;
            gap: 60px;
            min-height: 80vh;
        }

        .hero-text {
            max-width: 550px;
            flex: 1;
        }

        .hero-text h3 {
            font-size: clamp(20px, 4vw, 28px);
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .hero-text h2 { 
            font-size: clamp(42px, 8vw, 80px);
            line-height: 1.1;
            border-bottom: 12px solid white;
            display: inline-block;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-text p {
            font-size: clamp(20px, 4vw, 26px);
            font-weight: bold;
            opacity: 0.95;
            margin-bottom: 30px;
        }

        /* 🚀 BIG PICTURE - LAPTOP */
        .hero-image {
            flex: 1;
            max-width: 650px; /* Slightly bigger */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            max-height: 600px;
            object-fit: contain;
            filter: drop-shadow(20px 20px 40px rgba(0,0,0,0.7));
            transition: transform 0.3s ease;
        }

        .hero-image img:hover {
            transform: scale(1.05);
        }

        footer {
            padding: 25px;
            border-top: 4px solid white; 
            text-align: center;
            font-weight: bold;
            background: linear-gradient(135deg, maroon, #8B0000);
            color: white;
            margin-top: auto;
        }

        /* 📱 MOBILE - ULTRA BIG PICTURE */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                padding: 40px 20px;
                gap: 40px;
                text-align: center;
            }

            .hero-text {
                order: 1;
                width: 100%;
            }

            .hero-image {
                order: 2;
                width: 100vw; /* FULL screen width */
                margin-left: -20px;
                margin-right: -20px;
                max-width: calc(100vw - 40px);
            }

            .hero-image img {
                width: 100% !important;
                height: auto;
                max-height: 65vh;
                filter: drop-shadow(10px 10px 30px rgba(0,0,0,0.8));
            }
        }

        /* 🖥️ TABLET */
        @media (max-width: 1024px) and (min-width: 769px) {
            .hero {
                padding: 50px 8%;
                gap: 40px;
            }
            
            .hero-image {
                max-width: 500px;
            }
        }

        /* ✨ LOADING ANIMATION */
        .hero-image img {
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">MY COLLEGE DIARY</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>, 𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine L. Acaguindagan" loading="lazy">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️ | CSTA IT Student</p>
    </footer>

</body>
</html>
