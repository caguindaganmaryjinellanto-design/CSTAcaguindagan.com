<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | My College Diary</title>
    <style>
        /* Global Reset */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Times New Roman", Times, serif; 
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('CSTA.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        } /* FIXED: Added the missing closing brace here */

        header {
            background-color: maroon;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white;
            flex-wrap: wrap;
            gap: 15px;
        }

        header h1 a {
            text-decoration: none;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        /* --- HERO SECTION --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: row; /* Side-by-side on laptop */
            align-items: center;
            justify-content: center;
            padding: 40px 10%;
            gap: 40px;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-text h3 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .hero-text h2 { 
            font-size: clamp(40px, 8vw, 75px); /* Scales between mobile and laptop */
            font-weight: bold;
            line-height: 1.1;
            border-bottom: 10px solid white; 
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .hero-text p {
            font-size: 26px;
            font-weight: bold;
        }

        .hero-image {
            max-width: 110vh; /* Controls size on laptop */
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(15px 15px 25px rgba(0,0,0,0.6));
        }

        /* --- MOBILE FIX --- */
        @media (max-width: 900px) {
            .hero {
                flex-direction: column; /* Stacks vertically on phone */
                text-align: center;
                padding: 40px 20px;
                justify-content: center;
            }

            .hero-text {
                padding-bottom: 30px;
            }

            .hero-image {
                max-width: 100%; /* Keeps the image large but contained on phone */
            }
        }

        footer {
            padding: 20px;
            border-top: 4px solid white; 
            text-align: center;
            background: maroon; 
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html">HOME</a></h1>
        <nav>
            <a href="index.html">Home</a> 
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h3>Hello! I'm</h3>
            <h2>𝓒𝓪𝓰𝓾𝓲𝓷𝓭𝓪𝓰𝓪𝓷.<br>𝓜𝓪𝓻𝔂 𝓙𝓲𝓷𝓮 𝓛❤️</h2>
            <p>IT Student at CSTA.</p>
        </div>
        <div class="hero-image">
            <img src="maryjine.png" alt="Mary Jine">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My College Diary ❤️</p>
    </footer>

</body>
</html>
